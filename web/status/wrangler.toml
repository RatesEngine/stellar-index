# Cloudflare Pages config for the public status page
# (status.stellarindex.io) — now a REDIRECT-ONLY project: public/_redirects
# 301s every path to https://stellarindex.io/status (the page moved onto the
# main site). Kept deployed so the subdomain + its TLS cert keep resolving.
#
# Recommended deploy path is Cloudflare Pages' git integration —
# every push to main rebuilds and deploys without consuming the
# project's GitHub Actions minutes. See
# docs/operations/status-page-setup.md for the per-project setup
# steps; the status project follows the same shape as the
# explorer + dashboard wrangler.toml.

name = "stellarindex-status"
pages_build_output_dir = "./out"
compatibility_date = "2026-05-05"
