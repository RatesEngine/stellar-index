---
# Download + install Prometheus and AlertManager binaries from
# upstream tarballs. Apt packages lag versions; pinning to the
# upstream release lets us roll forward deliberately.

- name: ensure prometheus install dirs exist
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/prometheus,           owner: root, group: "{{ prometheus_user }}",   mode: "0750" }
    - { path: /etc/prometheus/rules.d,   owner: root, group: "{{ prometheus_user }}",   mode: "0750" }
    - { path: "{{ prometheus_data_dir }}", owner: "{{ prometheus_user }}", group: "{{ prometheus_group }}", mode: "0750" }
    - { path: /etc/alertmanager,         owner: root, group: "{{ alertmanager_user }}", mode: "0750" }
    - { path: /var/lib/alertmanager,     owner: "{{ alertmanager_user }}", group: "{{ alertmanager_group }}", mode: "0750" }

# F-1285 (codex audit-2026-05-13): fail fast if the operator
# hasn't supplied the prometheus release SHA256 in inventory.
# Pre-fix used `prometheus_sha256 | default(omit)` which silently
# DROPPED the checksum entirely when the variable wasn't set —
# installing unauthenticated upstream binaries.
- name: assert prometheus_sha256 is set
  assert:
    that:
      - prometheus_sha256 is defined
      - prometheus_sha256 | length == 64
    fail_msg: >-
      prometheus_sha256 must be set in inventory (SHA-256 of
      prometheus-{{ prometheus_version }}.linux-amd64.tar.gz).
      Get the SHA from the release page:
      https://github.com/prometheus/prometheus/releases/tag/v{{ prometheus_version }}

- name: download prometheus tarball
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: "0644"
    checksum: "sha256:{{ prometheus_sha256 }}"

- name: extract prometheus tarball
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp
    remote_src: yes

- name: install prometheus + promtool binaries
  copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: yes
  loop:
    - prometheus
    - promtool

# F-1285 (codex audit-2026-05-13): same fail-fast pattern as the
# prometheus checksum assert above.
- name: assert alertmanager_sha256 is set
  assert:
    that:
      - alertmanager_sha256 is defined
      - alertmanager_sha256 | length == 64
    fail_msg: >-
      alertmanager_sha256 must be set in inventory (SHA-256 of
      alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz).
      Get the SHA from the release page:
      https://github.com/prometheus/alertmanager/releases/tag/v{{ alertmanager_version }}

- name: download alertmanager tarball
  get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
    dest: /tmp/alertmanager.tar.gz
    mode: "0644"
    checksum: "sha256:{{ alertmanager_sha256 }}"

- name: extract alertmanager tarball
  unarchive:
    src: /tmp/alertmanager.tar.gz
    dest: /tmp
    remote_src: yes

- name: install alertmanager + amtool binaries
  copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: yes
  loop:
    - alertmanager
    - amtool
