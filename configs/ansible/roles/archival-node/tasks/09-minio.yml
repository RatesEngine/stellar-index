---
# Single-node MinIO so Galexie has an S3-compatible target locally.
# Production HA MinIO (9-node EC) is a later concern — tracked against
# the HA plan. See TODO(#0).

- name: Download MinIO server binary (pinned version)
  ansible.builtin.get_url:
    url: "https://dl.min.io/server/minio/release/linux-amd64/archive/minio.{{ minio_version }}"
    dest: /usr/local/bin/minio
    mode: "0755"
    owner: root
    group: root
    # TODO(#0): pin SHA256 once we lock the MinIO version.

- name: Template MinIO environment file
  ansible.builtin.template:
    src: minio.env.j2
    dest: /etc/default/minio
    owner: root
    group: minio
    mode: "0640"
  notify: Restart minio

- name: Install MinIO systemd unit
  ansible.builtin.template:
    src: systemd/minio.service.j2
    dest: /etc/systemd/system/minio.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart minio

- name: Enable + start MinIO
  ansible.builtin.systemd:
    name: minio
    state: started
    enabled: true
    daemon_reload: true

# ──── Bucket creation ─────────────────────────────────────────────
# Bootstrap the buckets galexie + pgBackRest + ad-hoc backups need.
# `mc` is MinIO's CLI; we install the standalone binary (not the
# apt package — there isn't one in stable at time of writing).
# Both `mc alias set` and `mc mb -p` are idempotent so this re-runs
# safely.

- name: Install mc (MinIO CLI) for bucket bootstrap + operator use
  ansible.builtin.get_url:
    url: "https://dl.min.io/client/mc/release/linux-amd64/mc"
    dest: /usr/local/bin/mc
    mode: "0755"
    owner: root
    group: root
  # TODO(#0): pin MinIO mc version + SHA256.

- name: Wait for MinIO API to be reachable on :9000
  ansible.builtin.uri:
    url: "http://127.0.0.1:9000/minio/health/live"
    status_code: 200
  retries: 15
  delay: 2
  register: minio_live
  until: minio_live.status == 200

- name: Configure mc alias for local MinIO
  # Env vars carry the credentials so they never land on argv (which
  # shows up in ps + journald). no_log prevents Ansible from
  # echoing them to stdout on failure.
  ansible.builtin.command:
    argv:
      - /usr/local/bin/mc
      - alias
      - set
      - local
      - "http://127.0.0.1:9000"
      - "{{ minio_root_user }}"
      - "{{ minio_root_password }}"
  changed_when: false
  no_log: true

- name: Ensure required MinIO buckets exist
  ansible.builtin.command: "/usr/local/bin/mc mb --ignore-existing local/{{ item }}"
  loop:
    - galexie-live       # galexie's continuous ledger-meta export target
    - galexie-archive    # mirror of SDF's history archive (phase 2)
    - backups            # pgBackRest WAL + rdb dumps (phase 2)
  register: mc_mb
  changed_when: "'Bucket created successfully' in mc_mb.stdout"
