---
# stellar-rpc: installed from apt.stellar.org. Captive-core pointed
# at our quorum set; event retention capped per defaults to avoid the
# SQLite growth flagged in the Phase-1 audit.

- name: Install stellar-rpc
  ansible.builtin.apt:
    name: stellar-rpc
    state: present

- name: Template captive-core.cfg for stellar-rpc's embedded core
  # Same Jinja template as stellar-core.cfg but rendered in "captive"
  # mode — disables HTTP, sets a distinct PEER_PORT (see comment in
  # template). [[HOME_DOMAINS]], [[VALIDATORS]], and [HISTORY.*] blocks
  # are identical to the full stellar-core config.
  ansible.builtin.template:
    src: stellar-core.cfg.j2
    dest: /etc/stellar/captive-core.cfg
    owner: stellar
    group: stellar
    mode: "0640"
  vars:
    cfg_mode: captive
    captive_peer_port: "{{ captive_peer_port_rpc }}"
  notify: Restart stellar-rpc

- name: Template stellar-rpc.cfg
  ansible.builtin.template:
    src: stellar-rpc.cfg.j2
    dest: /etc/stellar/stellar-rpc.cfg
    owner: stellar
    group: stellar
    mode: "0640"
  notify: Restart stellar-rpc

- name: Template /etc/default/stellar-rpc (S3 creds for datastore-fallback)
  # stellar-rpc reads the MinIO bucket galexie writes to, for
  # historical-ledger fallback beyond HISTORY_RETENTION_WINDOW.
  # Standard AWS_* env-var pattern (same creds galexie uses). The
  # systemd unit sources this via EnvironmentFile=-.
  ansible.builtin.copy:
    dest: /etc/default/stellar-rpc
    owner: root
    group: stellar
    mode: "0640"
    content: |
      # Rendered by Ansible. Do not edit by hand.
      AWS_ACCESS_KEY_ID={{ galexie_s3_access_key }}
      AWS_SECRET_ACCESS_KEY={{ galexie_s3_secret_key }}
      AWS_REGION={{ galexie_s3_region }}
      AWS_ENDPOINT_URL={{ galexie_s3_endpoint }}
  no_log: true
  notify: Restart stellar-rpc

- name: Install stellar-rpc systemd override
  ansible.builtin.template:
    src: systemd/stellar-rpc.service.j2
    dest: /etc/systemd/system/stellar-rpc.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart stellar-rpc

- name: Enable + start stellar-rpc
  ansible.builtin.systemd:
    name: stellar-rpc
    state: started
    enabled: true
    daemon_reload: true
